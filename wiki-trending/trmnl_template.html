<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  .screen {
    width: 800px;
    height: 480px;
    background: #fff;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    font-family: -apple-system, "Helvetica Neue", Arial, sans-serif;
    color: #000;
  }
  .header {
    padding: 14px 24px 10px;
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    border-bottom: 3px solid #000;
    flex-shrink: 0;
  }
  .header .date {
    font-size: 13px;
    opacity: 0.5;
  }
  .header .count {
    font-size: 12px;
    opacity: 0.4;
  }
  .articles {
    flex: 1;
    padding: 8px 24px 4px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
  }
  .article-row {
    display: flex;
    align-items: flex-start;
    gap: 14px;
    padding: 8px 0;
    border-bottom: 1px solid #ccc;
  }
  .article-row:last-child {
    border-bottom: none;
  }
  .mult-badge {
    flex-shrink: 0;
    min-width: 44px;
    padding: 4px 6px;
    text-align: center;
    font-weight: bold;
    font-size: 15px;
    border: 2px solid #000;
    border-radius: 6px;
    background: #000;
    color: #fff;
    line-height: 1;
    margin-top: 1px;
    white-space: nowrap;
  }
  .mult-suf {
    font-size: 10px;
    font-weight: normal;
    opacity: 0.7;
    letter-spacing: 0.5px;
  }
  .article-info {
    flex: 1;
    min-width: 0;
  }
  .article-top {
    display: flex;
    align-items: baseline;
    gap: 8px;
  }
  .article-name {
    font-size: 16px;
    font-weight: bold;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    flex: 1;
  }
  .article-views {
    font-size: 12px;
    flex-shrink: 0;
    opacity: 0.5;
  }
  .article-desc {
    font-size: 12px;
    margin-top: 3px;
    opacity: 0.45;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
    line-height: 1.3;
  }
  .footer {
    border-top: 2px solid #000;
    padding: 6px 24px;
    display: flex;
    align-items: center;
    font-size: 11px;
    flex-shrink: 0;
  }
  .footer .ft-updated {
    margin-left: auto;
    opacity: 0.5;
  }
</style>

<div class="screen">
  <div class="header">
    <span class="date">{{ date }}</span>
    <span class="count">{{ count }} articles trending</span>
  </div>

  <div class="articles">
    {% for a in articles %}
    <div class="article-row">
      <div class="mult-badge">{{ a.m.num }}<span class="mult-suf">{{ a.m.suf }}</span></div>
      <div class="article-info">
        <div class="article-top">
          <span class="article-name">{{ a.n }}</span>
          <span class="article-views">{{ a.v }} views</span>
        </div>
        <div class="article-desc">{{ a.d }}</div>
      </div>
    </div>
    {% endfor %}
  </div>

  <div class="footer">
    <span class="ft-updated">Updated {{ updated }}</span>
  </div>
</div>
